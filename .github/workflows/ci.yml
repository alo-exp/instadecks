name: CI
on: [push, pull_request]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install LibreOffice and Poppler
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice poppler-utils fontconfig
      - run: npm ci
      - name: Run tests
        run: npm test --if-present
      - name: Hardcoded path lint
        run: |
          ! grep -rE "/Users/|~/.claude|/home/|C:\\\\\\\\" \
              --include="*.js" --include="*.cjs" --include="*.json" --include="*.md" \
              --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.planning .
